<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="100%" style="stop-color:#333"/>
    </linearGradient>
  </defs>
  <rect width="1800" height="1050" fill="url(#bg)"/>
  <!-- Steam boiler silhouette -->
  <ellipse cx="500" cy="600" rx="200" ry="280" fill="#2a2a2a" stroke="#444" stroke-width="3"/>
  <rect x="300" y="320" width="400" height="560" rx="20" fill="#2a2a2a" stroke="#444" stroke-width="3"/>
  <rect x="350" y="280" width="300" height="60" rx="10" fill="#333" stroke="#555" stroke-width="2"/>
  <!-- Pressure gauges -->
  <circle cx="420" cy="480" r="45" fill="#1a1a1a" stroke="#666" stroke-width="3"/>
  <circle cx="420" cy="480" r="35" fill="none" stroke="#555" stroke-width="1"/>
  <line x1="420" y1="480" x2="445" y2="460" stroke="#888" stroke-width="2"/>
  <circle cx="580" cy="480" r="45" fill="#1a1a1a" stroke="#666" stroke-width="3"/>
  <circle cx="580" cy="480" r="35" fill="none" stroke="#555" stroke-width="1"/>
  <line x1="580" y1="480" x2="560" y2="455" stroke="#888" stroke-width="2"/>
  <!-- Pipes -->
  <rect x="440" y="200" width="30" height="120" fill="#333" stroke="#555" stroke-width="2"/>
  <rect x="530" y="200" width="30" height="120" fill="#333" stroke="#555" stroke-width="2"/>
  <ellipse cx="455" cy="200" rx="20" ry="8" fill="#444" stroke="#666" stroke-width="1"/>
  <ellipse cx="545" cy="200" rx="20" ry="8" fill="#444" stroke="#666" stroke-width="1"/>
  <!-- Steam wisps -->
  <path d="M 445 190 Q 430 150 450 120 Q 470 90 440 60" fill="none" stroke="#555" stroke-width="2" opacity="0.6"/>
  <path d="M 455 185 Q 475 140 455 110 Q 435 80 465 50" fill="none" stroke="#555" stroke-width="2" opacity="0.4"/>
  <path d="M 540 190 Q 560 145 540 115 Q 520 85 550 55" fill="none" stroke="#555" stroke-width="2" opacity="0.5"/>
  <!-- Divider line -->
  <line x1="850" y1="150" x2="850" y2="900" stroke="#444" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Circuit board / AI pattern on right -->
  <circle cx="1100" cy="400" r="8" fill="#555"/>
  <circle cx="1250" cy="350" r="8" fill="#555"/>
  <circle cx="1400" cy="420" r="8" fill="#555"/>
  <circle cx="1150" cy="550" r="8" fill="#555"/>
  <circle cx="1300" cy="500" r="8" fill="#555"/>
  <circle cx="1450" cy="560" r="8" fill="#555"/>
  <circle cx="1050" cy="680" r="8" fill="#555"/>
  <circle cx="1200" cy="650" r="8" fill="#555"/>
  <circle cx="1350" cy="700" r="8" fill="#555"/>
  <circle cx="1500" cy="670" r="8" fill="#555"/>
  <!-- Connection lines -->
  <line x1="1100" y1="400" x2="1250" y2="350" stroke="#444" stroke-width="1.5"/>
  <line x1="1250" y1="350" x2="1400" y2="420" stroke="#444" stroke-width="1.5"/>
  <line x1="1100" y1="400" x2="1150" y2="550" stroke="#444" stroke-width="1.5"/>
  <line x1="1250" y1="350" x2="1300" y2="500" stroke="#444" stroke-width="1.5"/>
  <line x1="1400" y1="420" x2="1450" y2="560" stroke="#444" stroke-width="1.5"/>
  <line x1="1150" y1="550" x2="1300" y2="500" stroke="#444" stroke-width="1.5"/>
  <line x1="1300" y1="500" x2="1450" y2="560" stroke="#444" stroke-width="1.5"/>
  <line x1="1150" y1="550" x2="1200" y2="650" stroke="#444" stroke-width="1.5"/>
  <line x1="1300" y1="500" x2="1350" y2="700" stroke="#444" stroke-width="1.5"/>
  <line x1="1450" y1="560" x2="1500" y2="670" stroke="#444" stroke-width="1.5"/>
  <line x1="1050" y1="680" x2="1200" y2="650" stroke="#444" stroke-width="1.5"/>
  <line x1="1200" y1="650" x2="1350" y2="700" stroke="#444" stroke-width="1.5"/>
  <line x1="1350" y1="700" x2="1500" y2="670" stroke="#444" stroke-width="1.5"/>
  <!-- Central brain/chip -->
  <rect x="1220" y="470" width="80" height="80" rx="5" fill="#2a2a2a" stroke="#666" stroke-width="2"/>
  <rect x="1235" y="485" width="50" height="50" rx="3" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <!-- Chip pins -->
  <line x1="1240" y1="470" x2="1240" y2="455" stroke="#555" stroke-width="2"/>
  <line x1="1260" y1="470" x2="1260" y2="455" stroke="#555" stroke-width="2"/>
  <line x1="1280" y1="470" x2="1280" y2="455" stroke="#555" stroke-width="2"/>
  <line x1="1240" y1="550" x2="1240" y2="565" stroke="#555" stroke-width="2"/>
  <line x1="1260" y1="550" x2="1260" y2="565" stroke="#555" stroke-width="2"/>
  <line x1="1280" y1="550" x2="1280" y2="565" stroke="#555" stroke-width="2"/>
  <!-- Title text -->
  <text x="900" y="950" font-family="Georgia, serif" font-size="28" fill="#777" text-anchor="middle" letter-spacing="4">AI FORENSIC AGENTS</text>
  <text x="900" y="990" font-family="Georgia, serif" font-size="16" fill="#555" text-anchor="middle" letter-spacing="6">HUMAN-CENTERED AI HARMS INVESTIGATION</text>
  <!-- Arrow connecting old to new -->
  <line x1="750" y1="525" x2="920" y2="525" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>